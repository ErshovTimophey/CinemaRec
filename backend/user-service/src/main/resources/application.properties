server.port=8082

spring.datasource.url=jdbc:postgresql://postgres:5432/auth_db
spring.datasource.username=tim
spring.datasource.password=tim
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=recommendation-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
logging.level.org.apache.kafka: INFO

# gRPC client to recommendation-service
grpc.client.recommendation-service.address=static://recommendation-service:9093
grpc.client.recommendation-service.negotiation-type=plaintext

spring.redis.host=redis
spring.redis.port=6379

